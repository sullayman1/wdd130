                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63071.14520126366!2d-12.072173593411833!3d8.884559462481397!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xf06a9be0db29e9d%3A0x9a77aab743de9a41!2sMakeni%2C%20Sierra%20Leone!5e0!3m2!1sen!2sng!4v1684636470864!5m2!1sen!2sng" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

                        <figure>
                            <img class="imagesCU" src="images/002.jpeg" alt="Manager picture" height="200px">
                            <figcaption>Manager</figcaption>
                        </figure>
                        <figure>
                            <img class="imagesCU" src="images/ooo1.jpeg" alt="Receptionist pictures" height="200px">

                            <figcaption>Guide</figcaption>
                        </figure>
                    </div>
                    
                    <form >
                        <fieldset class="Contact">
                            <legend> Contact Information</legend>
                            <label>User name:
                            <input type="text" name="Username"></label>
                            
                            <label>Email:
                                <input type="email" name="usermail"></label>
                        </fieldset>
                            
                        <fieldset>
                            <legend>Questions</legend>
                            <fieldset >
                                <legend>Purpose</legend>
                                <div id="radio">
                                    <label for="radio-button">General Inquiry</label>
                                    <input type="radio" name="google" id="radio-button">
                                    <label for="radio-button">Reservation Question</label>
                                    <input type="radio" name="google" id="radio-button1">
                                    <label for="radio-button">Website Suggestion</label>
                                    <input type="radio" name="google" id="radio-button2">
                                </div>
                            </fieldset>
                                
                            <textarea name="message" id="message" cols="29" rows="1" placeholder="Enter your message"></textarea>
                            
                            <label id="checkbox">Please subscribe me to the monthly newsletter
                                <input type="checkbox" name="subscribe"></label>
